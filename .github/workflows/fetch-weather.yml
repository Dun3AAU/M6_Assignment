name: Fetch Weather Data

on:
  schedule:
    # Run at 19:00 UTC (20:00 Copenhagen time in winter, 18:00 in summer)
    # Adjust to "0 18 * * *" if you're primarily in daylight saving time
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Fetch and store weather data
        run: uv run fetch.py

      - name: Commit database changes
        run: |
          git config user.name "Weather Bot"
          git config user.email "bot@example.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update weather data" && git push)
